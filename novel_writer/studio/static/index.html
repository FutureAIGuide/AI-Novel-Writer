<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Novel Writer Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,600;1,7..72,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --border: #2a3140;
      --text: #e8eaef;
      --muted: #8b95a8;
      --accent: #6c9ef8;
      --accent-dim: #4a7ad4;
      --success: #5ecf8a;
      --danger: #f07178;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      background: var(--panel);
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .meta {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 220px 1fr 280px;
      min-height: 0;
    }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: none !important; border-bottom: 1px solid var(--border); }
    }
    aside {
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    aside h2, .tools h2 {
      margin: 0;
      padding: 0.75rem 1rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    #story-list {
      list-style: none;
      margin: 0;
      padding: 0.5rem;
      overflow-y: auto;
      flex: 1;
    }
    #story-list li {
      padding: 0.5rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
    }
    #story-list li:hover { background: #222733; }
    #story-list li.active { background: #243044; color: var(--accent); }
    main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 1rem;
      gap: 0.75rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    label { font-size: 0.8rem; color: var(--muted); }
    select, input[type="number"], input[type="text"] {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 0.4rem 0.55rem;
      font-family: inherit;
      font-size: 0.85rem;
    }
    button {
      font-family: inherit;
      font-size: 0.85rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #222733;
      color: var(--text);
      padding: 0.45rem 0.75rem;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-dim));
      border-color: transparent;
      color: #0b0d12;
      font-weight: 600;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    textarea#editor {
      flex: 1;
      min-height: 320px;
      resize: vertical;
      background: #12151c;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 1rem;
      font-family: "Literata", Georgia, serif;
      font-size: 1rem;
      line-height: 1.65;
    }
    .tools {
      border-left: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .tools .panel-body {
      padding: 0.75rem 1rem;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .tools button { width: 100%; text-align: left; }
    pre#outline {
      margin: 0;
      white-space: pre-wrap;
      font-size: 0.78rem;
      color: var(--muted);
      max-height: 200px;
      overflow-y: auto;
    }
    .status {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--success); }
  </style>
</head>
<body>
  <header>
    <h1>AI Novel Writer Studio</h1>
    <div class="meta" id="provider-meta">Loading…</div>
  </header>
  <div class="layout">
    <aside>
      <h2>Stories</h2>
      <ul id="story-list"></ul>
    </aside>
    <main>
      <div class="toolbar">
        <label>Chapter <input type="number" id="chapter-num" min="1" value="1" style="width:4rem" /></label>
        <input type="text" id="chapter-title" placeholder="Chapter title (optional)" style="min-width:12rem;flex:1" />
        <input type="text" id="chapter-summary" placeholder="Summary / beats (optional)" style="min-width:14rem;flex:2" />
        <button type="button" class="primary" id="btn-generate">Generate chapter</button>
        <button type="button" id="btn-continue">Continue</button>
        <button type="button" id="btn-save">Save</button>
      </div>
      <textarea id="editor" placeholder="Open a story and write, or generate with AI…"></textarea>
      <div class="toolbar">
        <span class="status" id="ctx-status"></span>
        <span class="status" id="stream-status"></span>
      </div>
    </main>
    <aside class="tools">
      <h2>Outline &amp; selection</h2>
      <div class="panel-body">
        <pre id="outline"></pre>
        <label>Selection tools (uses highlighted text in editor)</label>
        <button type="button" data-op="rewrite">Rewrite selection</button>
        <button type="button" data-op="expand">Expand</button>
        <button type="button" data-op="shorten">Shorten</button>
        <button type="button" data-op="tone_dramatic">Tone: dramatic</button>
        <button type="button" data-op="tone_subtle">Tone: subtle</button>
        <button type="button" id="btn-replace-selection">Replace selection with result</button>
        <hr style="border:none;border-top:1px solid var(--border);margin:0.5rem 0" />
        <button type="button" id="btn-export-md">Export Markdown</button>
        <button type="button" id="btn-export-docx">Export DOCX</button>
        <button type="button" id="btn-snapshot">Snapshot chapter (manual)</button>
        <button type="button" id="btn-restore">Restore last snapshot</button>
      </div>
    </aside>
  </div>
  <script>
    const API = "";
    let currentStory = null;
    let lastStreamText = "";

    async function fetchJSON(url, opts) {
      const r = await fetch(url, opts);
      if (!r.ok) {
        const t = await r.text();
        throw new Error(t || r.statusText);
      }
      return r.json();
    }

    async function loadMeta() {
      try {
        const s = await fetchJSON(API + "/api/settings", {});
        document.getElementById("provider-meta").textContent =
          `${s.active_provider} · ${s.model || "default"} · ${s.supports_streaming ? "streaming" : "no stream"}`;
      } catch (e) {
        document.getElementById("provider-meta").textContent = String(e);
      }
    }

    async function refreshStories() {
      const { titles } = await fetchJSON(API + "/api/stories", {});
      const ul = document.getElementById("story-list");
      ul.innerHTML = "";
      titles.forEach((t) => {
        const li = document.createElement("li");
        li.textContent = t;
        li.dataset.title = t;
        li.addEventListener("click", () => openStory(t, li));
        ul.appendChild(li);
      });
    }

    async function openStory(title, liEl) {
      document.querySelectorAll("#story-list li").forEach((x) => x.classList.remove("active"));
      if (liEl) liEl.classList.add("active");
      currentStory = await fetchJSON(API + "/api/story?title=" + encodeURIComponent(title), {});
      const n = parseInt(document.getElementById("chapter-num").value, 10) || 1;
      const ch = (currentStory.chapters || []).find((c) => c.number === n);
      document.getElementById("editor").value = ch ? ch.content : "";
      document.getElementById("chapter-title").value = ch ? ch.title : "";
      document.getElementById("chapter-summary").value = ch ? ch.summary : "";
      document.getElementById("outline").textContent = currentStory.outline || "(no outline)";
      await refreshContextPack();
    }

    async function refreshContextPack() {
      if (!currentStory) return;
      const title = currentStory.title;
      const n = parseInt(document.getElementById("chapter-num").value, 10) || 1;
      try {
        const m = await fetchJSON(
          API + "/api/context-pack?title=" + encodeURIComponent(title) + "&before_chapter=" + n,
          {}
        );
        const pct = m.budget_tokens
          ? Math.round((m.estimated_prompt_tokens / m.budget_tokens) * 100)
          : 0;
        document.getElementById("ctx-status").textContent =
          `Context ~${m.estimated_prompt_tokens} / ${m.budget_tokens} est. tokens (${pct}%)` +
          (m.trimmed ? " · trimmed for budget" : "");
        document.getElementById("ctx-status").className = "status" + (m.trimmed ? " error" : " ok");
      } catch (e) {
        document.getElementById("ctx-status").textContent = String(e);
        document.getElementById("ctx-status").className = "status error";
      }
    }

    document.getElementById("chapter-num").addEventListener("change", async () => {
      if (!currentStory) return;
      const n = parseInt(document.getElementById("chapter-num").value, 10) || 1;
      const ch = (currentStory.chapters || []).find((c) => c.number === n);
      document.getElementById("editor").value = ch ? ch.content : "";
      document.getElementById("chapter-title").value = ch ? ch.title : "";
      document.getElementById("chapter-summary").value = ch ? ch.summary : "";
      await refreshContextPack();
    });

    /**
     * @param {string} url
     * @param {object} body
     * @param {{ prefix?: string }} opts - if prefix set, streamed chunks append after prefix
     */
    async function readSSE(url, body, opts) {
      opts = opts || {};
      const prefix = opts.prefix || "";
      lastStreamText = "";
      let delta = "";
      const st = document.getElementById("stream-status");
      st.textContent = "Streaming…";
      st.className = "status";
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok || !res.body) {
        st.textContent = await res.text();
        st.className = "status error";
        throw new Error(st.textContent);
      }
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let idx;
        while ((idx = buf.indexOf("\n\n")) >= 0) {
          const line = buf.slice(0, idx).trimEnd();
          buf = buf.slice(idx + 2);
          if (!line.startsWith("data:")) continue;
          const jsonStr = line.slice(5).trim();
          try {
            const obj = JSON.parse(jsonStr);
            if (obj.chunk) {
              delta += obj.chunk;
              lastStreamText = prefix + delta;
              document.getElementById("editor").value = lastStreamText;
            }
            if (obj.done) {
              st.textContent = "Done.";
              st.className = "status ok";
            }
          } catch (_) {}
        }
      }
    }

    document.getElementById("btn-generate").addEventListener("click", async () => {
      if (!currentStory) return alert("Open a story first.");
      const btn = document.getElementById("btn-generate");
      btn.disabled = true;
      try {
        await readSSE(
          API + "/api/stream/chapter",
          {
            title: currentStory.title,
            chapter_number: parseInt(document.getElementById("chapter-num").value, 10) || 1,
            chapter_title: document.getElementById("chapter-title").value,
            chapter_summary: document.getElementById("chapter-summary").value,
            extra_instructions: "",
          },
          {}
        );
      } catch (e) {
        document.getElementById("stream-status").textContent = String(e);
        document.getElementById("stream-status").className = "status error";
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById("btn-continue").addEventListener("click", async () => {
      if (!currentStory) return alert("Open a story first.");
      const n = parseInt(document.getElementById("chapter-num").value, 10) || 1;
      const existing = (currentStory.chapters || []).find((c) => c.number === n);
      const base = existing ? existing.content : "";
      document.getElementById("editor").value = base;
      const btn = document.getElementById("btn-continue");
      btn.disabled = true;
      try {
        await readSSE(
          API + "/api/stream/continue",
          {
            title: currentStory.title,
            chapter_number: n,
            continuation_hint: "",
          },
          { prefix: base }
        );
      } catch (e) {
        document.getElementById("stream-status").textContent = String(e);
        document.getElementById("stream-status").className = "status error";
      } finally {
        btn.disabled = false;
      }
    });

    document.querySelectorAll(".tools button[data-op]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        if (!currentStory) return alert("Open a story first.");
        const ta = document.getElementById("editor");
        const sel = ta.value.substring(ta.selectionStart, ta.selectionEnd);
        if (!sel.trim()) return alert("Select text in the editor first.");
        const op = btn.getAttribute("data-op");
        const btnSelf = btn;
        btnSelf.disabled = true;
        try {
          await readSSE(
            API + "/api/stream/selection",
            {
              title: currentStory.title,
              chapter_number: parseInt(document.getElementById("chapter-num").value, 10) || 1,
              selected_text: sel,
              operation: op,
              extra_instruction: "",
            },
            {}
          );
        } catch (e) {
          document.getElementById("stream-status").textContent = String(e);
          document.getElementById("stream-status").className = "status error";
        } finally {
          btnSelf.disabled = false;
        }
      });
    });

    document.getElementById("btn-replace-selection").addEventListener("click", () => {
      const ta = document.getElementById("editor");
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const rep = lastStreamText.trim();
      if (!rep) return alert("Run a selection tool first (result is empty).");
      ta.value = ta.value.slice(0, start) + rep + ta.value.slice(end);
      ta.selectionStart = start;
      ta.selectionEnd = start + rep.length;
    });

    document.getElementById("btn-save").addEventListener("click", async () => {
      if (!currentStory) return alert("Open a story first.");
      const n = parseInt(document.getElementById("chapter-num").value, 10) || 1;
      let chapters = [...(currentStory.chapters || [])];
      const idx = chapters.findIndex((c) => c.number === n);
      const body = {
        number: n,
        title: document.getElementById("chapter-title").value,
        summary: document.getElementById("chapter-summary").value,
        content: document.getElementById("editor").value,
        notes: idx >= 0 ? chapters[idx].notes || "" : "",
        content_history: idx >= 0 ? chapters[idx].content_history || [] : [],
      };
      if (idx >= 0) chapters[idx] = body;
      else chapters.push(body);
      chapters.sort((a, b) => a.number - b.number);
      const payload = { ...currentStory, chapters };
      await fetchJSON(API + "/api/story", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ story: payload }),
      });
      currentStory = payload;
      document.getElementById("stream-status").textContent = "Saved.";
      document.getElementById("stream-status").className = "status ok";
    });

    document.getElementById("btn-export-md").addEventListener("click", async () => {
      if (!currentStory) return;
      const r = await fetchJSON(
        API + "/api/export/markdown?title=" + encodeURIComponent(currentStory.title),
        { method: "POST" }
      );
      alert("Exported to " + r.path);
    });

    document.getElementById("btn-export-docx").addEventListener("click", async () => {
      if (!currentStory) return;
      try {
        const r = await fetchJSON(
          API + "/api/export/docx?title=" + encodeURIComponent(currentStory.title),
          { method: "POST" }
        );
        alert("Exported to " + r.path);
      } catch (e) {
        alert(String(e));
      }
    });

    document.getElementById("btn-snapshot").addEventListener("click", () => {
      if (!currentStory) return;
      const n = parseInt(document.getElementById("chapter-num").value, 10) || 1;
      let chapters = [...(currentStory.chapters || [])];
      const idx = chapters.findIndex((c) => c.number === n);
      if (idx < 0) return alert("Save the chapter first.");
      const hist = [...(chapters[idx].content_history || [])];
      hist.push({
        saved_at: new Date().toISOString(),
        label: "manual snapshot",
        content: chapters[idx].content,
      });
      chapters[idx] = { ...chapters[idx], content_history: hist.slice(-20) };
      currentStory = { ...currentStory, chapters };
      alert("Snapshot added to in-memory story — click Save to persist.");
    });

    document.getElementById("btn-restore").addEventListener("click", () => {
      if (!currentStory) return;
      const n = parseInt(document.getElementById("chapter-num").value, 10) || 1;
      const chapters = [...(currentStory.chapters || [])];
      const idx = chapters.findIndex((c) => c.number === n);
      if (idx < 0) return;
      const hist = [...(chapters[idx].content_history || [])];
      if (!hist.length) return alert("No snapshot.");
      const entry = hist.pop();
      chapters[idx] = { ...chapters[idx], content: entry.content, content_history: hist };
      currentStory = { ...currentStory, chapters };
      document.getElementById("editor").value = entry.content;
      alert("Restored in memory — click Save to persist.");
    });

    loadMeta();
    refreshStories().catch(console.error);
  </script>
</body>
</html>
